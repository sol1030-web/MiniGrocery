<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>MiniGrocery - Maintenance</title>
    <style>
        html, body { height: 100%; margin: 0; font-family: Inter, Arial, sans-serif; background: #0d1b2a; color: #fff; }
        .wrap { display: flex; align-items: center; justify-content: center; height: 100%; text-align: center; padding: 24px; }
        .card { background: rgba(255,255,255,0.06); border-radius: 12px; padding: 32px 28px; max-width: 560px; box-shadow: 0 12px 32px rgba(0,0,0,0.25); }
        h1 { margin: 0 0 12px; font-size: 28px; letter-spacing: 0.5px; }
        p { margin: 0; opacity: 0.9; }
    </style>
    <meta http-equiv="refresh" content="300">
</head>
<body>
    <div class="wrap">
        <div class="card">
            <h1>We are performing maintenance</h1>
            <p>MiniGrocery is temporarily offline while we update the site. Please check back soon.</p>
        </div>
    </div>
</body>
</html>
